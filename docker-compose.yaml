services:

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - 8000:8000
    depends_on:
      - postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  postgres:
    image: postgres:15
    env_file:
      - .env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
      